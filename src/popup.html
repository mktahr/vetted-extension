<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vetted</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">V</div>
      <span class="header-title">Vetted</span>
    </header>

    <!-- Empty state -->
    <div id="empty" class="empty">
      <p>Navigate to a LinkedIn profile and click <strong>Vetted</strong> to scrape.</p>
    </div>

    <!-- Profile preview -->
    <div id="preview" class="hidden">
      <!-- Status banner -->
      <div id="statusBanner" class="status-banner hidden"></div>

      <!-- View-in-Vetted link (shown after successful send) -->
      <a id="vettedLink" class="vetted-link hidden" href="#" target="_blank">
        View in Vetted →
      </a>

      <!-- Profile header -->
      <div class="profile-header">
        <h2 id="prevName" class="profile-name"></h2>
        <div id="prevHeadline" class="profile-headline"></div>
        <div class="profile-meta-row">
          <span id="prevLocation" class="profile-location"></span>
        </div>
        <a id="prevUrl" class="profile-url" href="#" target="_blank"></a>
      </div>

      <!-- Summary stats — quick check before sending -->
      <div class="section">
        <div class="section-title">Preview</div>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Years Exp.</div>
            <div id="statYears" class="stat-value">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Experience</div>
            <div id="statExpCount" class="stat-value">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Education</div>
            <div id="statEduCount" class="stat-value">—</div>
          </div>
        </div>
        <div id="warnings" class="warnings hidden"></div>
      </div>

      <!-- Current role -->
      <div class="section">
        <div class="section-title">Current Role</div>
        <div id="prevCurrentRole" class="current-role"></div>
      </div>

      <!-- Editable tags -->
      <div class="section">
        <div class="section-title">Tags <span id="tagsBucket" class="bucket-pill hidden"></span></div>
        <div class="tags-row">
          <div class="tag-control">
            <div class="tag-label">Function</div>
            <select id="tagFunction" class="tag-select">
              <!-- options populated by popup.ts -->
            </select>
          </div>
          <div class="tag-control">
            <div class="tag-label">Specialty</div>
            <select id="tagSpecialty" class="tag-select">
            </select>
          </div>
          <div class="tag-control">
            <div class="tag-label">Seniority</div>
            <select id="tagSeniority" class="tag-select">
            </select>
          </div>
        </div>
        <button id="updateTagsBtn" class="update-tags-btn hidden">Update Tags</button>
      </div>

      <!-- Experience -->
      <div id="experienceSection" class="section hidden">
        <div class="section-title">Experience <span id="expCount" class="badge"></span></div>
        <div id="experienceList" class="card-list"></div>
      </div>

      <!-- Education -->
      <div id="educationSection" class="section hidden">
        <div class="section-title">Education <span id="eduCount" class="badge"></span></div>
        <div id="educationList" class="card-list"></div>
      </div>

      <!-- About -->
      <div id="summarySection" class="section hidden">
        <div class="section-title">About</div>
        <p id="prevSummary" class="summary-text"></p>
      </div>

      <!-- Send -->
      <div class="send-row">
        <button id="sendBtn" class="send-btn">Send to Database</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
